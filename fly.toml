app = "a11y-issue-logger-api"
primary_region = "sin"

[build]

[env]
  ENABLE_LIVE_SCAN = "true"
  AI_PROVIDER = "groq"
  PYTHONPATH = "/app"
  PLAYWRIGHT_BROWSERS_PATH = "/ms-playwright"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
