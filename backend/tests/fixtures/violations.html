<body>
  <!-- WCAG 1.1.1: image missing alt -->

  <!-- WCAG 4.1.2: button with no accessible name -->

    <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
  </button>

  <!-- WCAG 1.3.1: input with no label -->

  <!-- WCAG 2.4.4: link with no text -->

    <svg aria-hidden="true" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/></svg>
  </a>
</body>
</html>
