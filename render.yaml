services:
  - type: web
    name: a11y-issue-logger-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AI_PROVIDER
        value: template
      - key: ENABLE_LIVE_SCAN
        value: "false"
      - key: GITHUB_TOKEN
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
