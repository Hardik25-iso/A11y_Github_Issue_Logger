name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — lint, type-check, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt playwright==1.52.0 ruff mypy

      - name: Lint (ruff)
        run: ruff check backend/app

      - name: Type-check (mypy)
        run: mypy backend/app --ignore-missing-imports --no-strict-optional

      - name: Install Playwright browser (Chromium only)
        run: python -m playwright install chromium --with-deps

      - name: Run tests
        env:
          AI_PROVIDER: template
          ENABLE_LIVE_SCAN: "false"
          GITHUB_TOKEN: ""
        run: python -m pytest backend/tests -q --tb=short

  frontend:
    name: Frontend — lint, build, audit
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint src/

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  axe-self-check:
    name: Accessibility — self-audit (axe-core)
    runs-on: ubuntu-latest
    needs: frontend

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build frontend
        run: npm run build

      - name: Run axe against own UI
        run: npx playwright test e2e/axe-self.spec.js --project=chromium

  e2e:
    name: E2E — Playwright (Chromium)
    runs-on: ubuntu-latest
    needs: frontend

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
